name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # 第一步：自动扫描 OJ_title 更新配置
  scan-and-update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Scan OJ_title and update config
        run: |
          python3 update_config.py --rebuild
          
          # 拆分为 100 分题和 200 分题
          python3 -c "
import json, os, re
from collections import Counter

with open('config.json', 'r', encoding='utf-8-sig') as f:
    config = json.load(f)
questions = config.get('questions', [])

def extract_tags(filename):
    tags = []
    fname = os.path.basename(filename) if isinstance(filename, str) else ''
    cat_keywords = {
        '字符串': ['字符串', '子串', '字符', '子序列', '回文'],
        '数组': ['数组', '下标'],
        '动态规划': ['动态规划', 'DP', 'dp'],
        '排序': ['排序', '冒泡', '快排'],
        '树': ['树', '二叉树', 'BST'],
        '图': ['图', '最短路径', '拓扑', 'Dijkstra'],
        '矩阵': ['矩阵', '螺旋'],
        '栈': ['栈', 'Stack'],
        '队列': ['队列', 'Queue'],
        '链表': ['链表', 'List'],
        '贪心': ['贪心'],
        '哈希': ['哈希', 'Hash', '散列'],
        '二分': ['二分', '折半'],
        '回溯': ['回溯', 'DFS', '深度优先'],
        '搜索': ['搜索', 'BFS', '广度优先'],
        '滑动窗口': ['滑动窗口'],
        '双指针': ['双指针'],
        '模拟': ['模拟'],
        '递归': ['递归'],
        '位运算': ['位运算', '二进制', '比特'],
        '设计': ['设计', 'LRU', 'LFU'],
        '数学': ['数学', '概率', '排列', '组合'],
    }
    for cat, keywords in cat_keywords.items():
        for kw in keywords:
            if kw in fname:
                tags.append(cat)
                break
    vol_match = re.search(r'\(([ABCDE]卷)[,，]?\d*分?\)', fname)
    if vol_match:
        tags.append(vol_match.group(1))
    if '2025B' in fname:
        tags.append('2025B')
    return tags

for q in questions:
    file_path = q.get('file', '')
    existing_tags = q.get('tags', []) or []
    extracted = extract_tags(file_path)
    q['tags'] = list(set(existing_tags + extracted))

q100 = sorted([q for q in questions if q.get('score') == 100], key=lambda x: x.get('title', ''))
q200 = sorted([q for q in questions if q.get('score') == 200], key=lambda x: x.get('title', ''))

with open('problems-100.json', 'w', encoding='utf-8') as f:
    json.dump({'questions': q100, 'total': len(q100), 'type': '100分题'}, f, ensure_ascii=False, indent=2)
with open('problems-200.json', 'w', encoding='utf-8') as f:
    json.dump({'questions': q200, 'total': len(q200), 'type': '200分题'}, f, ensure_ascii=False, indent=2)

print(f'problems-100.json: {len(q100)} 题')
print(f'problems-200.json: {len(q200)} 题')
print(f'config.json: {len(questions)} 题')
"
      
      - name: Commit updated config files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add problems-100.json problems-200.json config.json
          git diff --cached --quiet || git commit -m "chore: auto-scan OJ_title and update config files"
          git push

  # 第二步：部署到 GitHub Pages
  deploy:
    needs: scan-and-update
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - id: deployment
        uses: actions/deploy-pages@v4
